{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Russian Learning Center</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page">
        <h1>Russian Learning Center</h1>

        <div class="nav">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'word_list' %}">All Words</a>
            <a href="{% url 'add_word' %}">Add Word</a>
            <a href="{% url 'practice_word' %}">Practice</a>
        </div>

        <hr>

        {% if messages %}
            {% for message in messages %}
                <div class="message message-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
