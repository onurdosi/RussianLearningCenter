{% extends 'vocab/base.html' %}

{% block content %}
    <h2>Delete Word</h2>

    <div class="word-card">
        <p>Are you sure you want to delete this word?</p>

        <p><strong>Russian word:</strong> {{ word.russian_word }}</p>
        <p><strong>Translation:</strong> {{ word.translation }}</p>

        {% if word.notes %}
            <p><strong>Notes:</strong> {{ word.notes }}</p>
        {% endif %}

        <form method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit">Yes, delete</button>
        </form>

        <form action="{% url 'word_list' %}" method="get" style="display: inline;">
            <button type="submit">Cancel</button>
        </form>
    </div>
{% endblock %}
